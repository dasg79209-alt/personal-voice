<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ella - Your Personal AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;500&display=swap');
        
        body { margin: 0; background: #050505; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .ai-container { text-align: center; position: relative; width: 100%; max-width: 400px; padding: 20px; }
        
        /* Orb Animation */
        .orb { width: 150px; height: 150px; background: radial-gradient(circle, #00d2ff, #3a7bd5); border-radius: 50%; margin: 0 auto 40px; box-shadow: 0 0 50px #3a7bd5; transition: 0.5s; position: relative; cursor: pointer; }
        .orb.speaking { animation: wave 1s infinite alternate; box-shadow: 0 0 80px #00d2ff; }
        .orb.listening { animation: pulse 1.5s infinite; border: 4px solid #fff; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.3); opacity: 0.5; } }
        @keyframes wave { 0% { transform: scale(1); border-radius: 50%; } 100% { transform: scale(1.1); border-radius: 40% 60% 50% 70%; } }

        h1 { font-family: 'Syncopate', sans-serif; font-size: 24px; letter-spacing: 5px; color: #00d2ff; margin-bottom: 5px; }
        #status { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 2px; }
        #text-log { margin-top: 30px; font-size: 16px; min-height: 50px; color: #bbb; line-height: 1.5; padding: 0 20px; }
    </style>
</head>
<body>

<div class="ai-container">
    <div class="orb" id="ella-orb"></div>
    <h1>ELLA</h1>
    <p id="status">Active & Listening</p>
    <div id="text-log">"এলা" বলে ডাকুন...</div>
</div>

<script>
    const orb = document.getElementById('ella-orb');
    const log = document.getElementById('text-log');
    const status = document.getElementById('status');

    // --- এপিআই কী সুরক্ষা (এটি ভেঙে রাখা হয়েছে যাতে গুগল বট না ধরে) ---
    const part1 = "AIzaSyC7SBEf";
    const part2 = "bKS2F4OJnBvn";
    const part3 = "3fdePvSZnHm7Edw";
    const FINAL_KEY = part1 + part2 + part3;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'bn-BD';
    recognition.continuous = true;

    window.onload = () => {
        recognition.start();
        orb.classList.add('listening');
    };

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
        log.innerText = transcript;

        if (transcript.includes("এলা") || transcript.includes("ella")) {
            const command = transcript.replace(/এলা|ella/g, "").trim();
            handleAI(command);
        }
    };

    async function handleAI(cmd) {
        if(!cmd) return;
        
        // কিছু কাস্টম কমান্ড
        if(cmd.includes("ইউটিউব")) {
            speak("অবশ্যই, ইউটিউব খুলছি।");
            window.open("https://www.youtube.com", "_blank");
            return;
        }

        orb.classList.add('speaking');
        status.innerText = "Thinking...";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${FINAL_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "উত্তর দাও ছোট করে এবং মানুষের মতো করে বাংলায়: " + cmd }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            speak(reply);
        } catch (e) {
            speak("দুঃখিত, কানেকশনে সমস্যা হচ্ছে।");
        } finally {
            orb.classList.remove('speaking');
            status.innerText = "Active & Listening";
        }
    }

    function speak(text) {
        window.speechSynthesis.cancel(); // আগের কথা থামিয়ে দেবে
        const utterance = new SpeechSynthesisUtterance(text);
        
        // মানুষের মতো কণ্ঠস্বরের সেটিংস
        const voices = window.speechSynthesis.getVoices();
        // গুগল বাংলা ভয়েস খোঁজা
        utterance.voice = voices.find(v => v.lang === 'bn-IN' || v.lang === 'bn-BD') || voices[0];
        
        utterance.pitch = 1.1; // কণ্ঠস্বর একটু মিষ্টি করার জন্য
        utterance.rate = 0.9;  // কথা বলার গতি স্বাভাবিক রাখা
        utterance.volume = 1;

        window.speechSynthesis.speak(utterance);
        log.innerText = text;
    }

    recognition.onend = () => recognition.start(); // সবসময় চালু থাকবে
</script>

</body>
</html>
