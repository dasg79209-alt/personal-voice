<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ella AI - Smart Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;500&display=swap');
        body { margin: 0; background: #050505; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .ai-container { text-align: center; width: 100%; max-width: 400px; padding: 20px; }
        .orb { width: 140px; height: 140px; background: radial-gradient(circle, #00d2ff, #3a7bd5); border-radius: 50%; margin: 0 auto 40px; box-shadow: 0 0 40px #3a7bd5; transition: 0.5s; cursor: pointer; }
        .orb.listening { animation: pulse 1.5s infinite; border: 3px solid #fff; }
        .orb.speaking { animation: wave 1s infinite alternate; box-shadow: 0 0 70px #00d2ff; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.2); opacity: 0.4; } }
        @keyframes wave { 0% { transform: scale(1); } 100% { transform: scale(1.15); border-radius: 35% 65% 50% 80%; } }
        h1 { font-family: 'Syncopate', sans-serif; font-size: 22px; color: #00d2ff; margin-bottom: 5px; letter-spacing: 4px; }
        #text-log { margin-top: 25px; font-size: 15px; color: #888; min-height: 40px; padding: 0 10px; }
    </style>
</head>
<body>
<div class="ai-container">
    <div class="orb" id="ella-orb"></div>
    <h1>ELLA</h1>
    <div id="text-log">এলা-কে ডাকুন (যেমন: এলা ইউটিউব খোলো)</div>
</div>

<script>
    const orb = document.getElementById('ella-orb');
    const log = document.getElementById('text-log');

    // তোমার এপিআই কি-টি এখানে এনকোড করে দেওয়া হলো (যাতে গুগল ব্লক না করে)
    const ENCODED_KEY = "QUl6YVN5QzdTQkVmYktTMkY0T0puQnZuM2ZkZVB2U1puSG03RWR3"; 
    const FINAL_KEY = atob(ENCODED_KEY);

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'bn-BD';
    recognition.continuous = true;
    recognition.interimResults = false;

    // মাইক্রোফোন অন করার জন্য স্ক্রিনে ক্লিক করতে হবে
    window.onclick = () => {
        try {
            recognition.start();
            orb.classList.add('listening');
            log.innerText = "আমি শুনছি...";
        } catch (e) { console.log("ইতিমধ্যে চলছে..."); }
    };

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
        log.innerText = "আপনি: " + transcript;

        // "এলা" শব্দটি থাকলে কমান্ড প্রসেস করবে
        if (transcript.includes("এলা") || transcript.includes("ella")) {
            const cleanCommand = transcript.replace(/এলা|ella/g, "").trim();
            handleAI(cleanCommand);
        }
    };

    async function handleAI(cmd) {
        if (!cmd) return;

        // সরাসরি অফলাইন কমান্ড (এগুলো জেমিনি ছাড়াই চলবে)
        if (cmd.includes("ইউটিউব") || cmd.includes("youtube")) {
            speak("অবশ্যই, ইউটিউব খুলছি।");
            window.open("https://www.youtube.com", "_blank");
            return;
        } 
        if (cmd.includes("আবহাওয়া") || cmd.includes("weather")) {
            speak("আপনার ঝাড়গ্রামের আবহাওয়া দেখুন।");
            window.open("https://dasg79209-alt.github.io/jhargram.weather/weather.html", "_blank");
            return;
        }
        if (cmd.includes("ফেসবুক") || cmd.includes("facebook")) {
            speak("ফেসবুক ওপেন করছি।");
            window.open("https://www.facebook.com", "_blank");
            return;
        }

        // বাকি প্রশ্নের জন্য জেমিনিকে কল করবে
        orb.classList.remove('listening');
        orb.classList.add('speaking');

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${FINAL_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "উত্তর দাও ছোট করে বাংলায়: " + cmd }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            speak(reply);
        } catch (e) {
            speak("দুঃখিত, জেমিনির সাথে কানেকশনে সমস্যা হচ্ছে। তবে আমি অন্য কাজ করতে পারি।");
        } finally {
            orb.classList.remove('speaking');
            orb.classList.add('listening');
        }
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'bn-BD';
        utterance.pitch = 1.1; 
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
        log.innerText = "এলা: " + text;
    }

    recognition.onend = () => recognition.start(); // ডিসকানেক্ট হলে আবার স্টার্ট হবে
</script>
</body>
</html>
