<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ella - Fast AI</title>
    <style>
        body { margin: 0; background: #010409; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .orb { width: 140px; height: 140px; background: radial-gradient(circle, #00f2fe, #4facfe); border-radius: 50%; box-shadow: 0 0 40px #4facfe; cursor: pointer; }
        .orb.active { animation: pulse 1s infinite alternate; }
        #log { margin-top: 20px; font-size: 16px; color: #8b949e; text-align: center; padding: 0 20px; }
        #error-msg { color: #ff7b72; font-size: 11px; margin-top: 10px; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="orb" id="orb"></div>
        <h1 style="color: #4facfe; letter-spacing: 5px;">ELLA</h1>
        <div id="log">একবার ক্লিক করে বলুন: "এলা ইউটিউব খোলো"</div>
        <div id="error-msg"></div>
    </div>

<script>
    const orb = document.getElementById('orb');
    const log = document.getElementById('log');
    const errMsg = document.getElementById('error-msg');

    // তোমার এপিআই কি
    const key = atob("QUl6YVN5QzdTQkVmYktTMkY0T0puQnZuM2ZkZVB2U1puSG03RWR3");

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'bn-BD';
    recognition.continuous = true;

    orb.onclick = () => {
        try {
            recognition.start();
            orb.classList.add('active');
            log.innerText = "আমি শুনছি...";
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        } catch(e) {}
    };

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
        log.innerText = "আপনি: " + transcript;

        if (transcript.includes("এলা") || transcript.includes("ella")) {
            let cmd = transcript.replace(/এলা|ella/g, "").trim();
            
            // ইউটিউব বা ওয়েদার হলে সাথে সাথে অ্যাকশন নেবে (কোনো দেরি হবে না)
            if (cmd.includes("ইউটিউব")) {
                speak("ইউটিউব খুলছি।");
                window.location.href = "https://www.youtube.com"; // ফোনের জন্য এটি বেশি দ্রুত
                return;
            } else if (cmd.includes("আবহাওয়া")) {
                speak("ঝাড়গ্রামের আবহাওয়া দেখুন।");
                window.location.href = "https://dasg79209-alt.github.io/jhargram.weather/weather.html";
                return;
            } 
            
            // অন্য সব প্রশ্নের জন্য জেমিনি
            askGemini(cmd);
        }
    };

    async function askGemini(q) {
        if(!q) return;
        // জেমিনি প্রো মডেল ব্যবহার করছি যা সব জায়গায় চলে
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`;
        
        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "সংক্ষেপে উত্তর দাও: " + q }] }] })
            });
            const data = await response.json();
            
            if (data.error) {
                errMsg.innerText = "Error: " + data.error.message;
            } else {
                errMsg.innerText = "";
                speak(data.candidates[0].content.parts[0].text);
            }
        } catch (e) {
            errMsg.innerText = "কানেকশন সমস্যা!";
        }
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'bn-BD';
        window.speechSynthesis.speak(utter);
        log.innerText = "এলা: " + text;
    }

    recognition.onend = () => recognition.start();
</script>
</body>
</html>
