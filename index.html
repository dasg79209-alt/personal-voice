<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ella - Pro Assistant</title>
    <style>
        body { margin: 0; background: #020617; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .orb { width: 140px; height: 140px; background: radial-gradient(circle, #38bdf8, #1e40af); border-radius: 50%; box-shadow: 0 0 30px #1e40af; cursor: pointer; transition: 0.5s; }
        .orb.active { animation: pulse 1s infinite alternate; box-shadow: 0 0 60px #38bdf8; }
        #log { margin-top: 30px; font-size: 16px; color: #94a3b8; text-align: center; padding: 0 20px; }
        #error-msg { color: #f87171; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="orb" id="orb"></div>
        <h1 style="letter-spacing: 5px; color: #38bdf8; margin-top: 20px;">ELLA</h1>
        <div id="log">একবার ক্লিক করে "এলা" ডাকুন...</div>
        <div id="error-msg"></div>
    </div>

<script>
    const orb = document.getElementById('orb');
    const log = document.getElementById('log');
    const errMsg = document.getElementById('error-msg');

    // তোমার কি-টি এখানে আছে
    const key = atob("QUl6YVN5QzdTQkVmYktTMkY0T0puQnZuM2ZkZVB2U1puSG03RWR3");

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'bn-BD';
    recognition.continuous = true;

    orb.onclick = () => {
        recognition.start();
        orb.classList.add('active');
        log.innerText = "আমি শুনছি, এলা বলুন...";
        // একটি ব্ল্যাঙ্ক সাউন্ড প্লে করা যাতে স্পিকার একটিভ হয়
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
    };

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
        log.innerText = "আপনি: " + transcript;

        if (transcript.includes("এলা") || transcript.includes("ella")) {
            let cmd = transcript.replace(/এলা|ella/g, "").trim();
            
            // ইউটিউব সরাসরি চেক
            if (cmd.includes("ইউটিউব")) {
                speak("ইউটিউব খুলছি।");
                window.open("https://www.youtube.com", "_blank");
            } else {
                askGemini(cmd);
            }
        }
    };

    async function askGemini(q) {
        if(!q) return;
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Answer in short Bengali: " + q }] }] })
            });
            const data = await response.json();
            
            if (data.error) {
                errMsg.innerText = "Error: " + data.error.message;
                speak("আপনার এপিআই কি কাজ করছে না।");
            } else {
                speak(data.candidates[0].content.parts[0].text);
            }
        } catch (e) {
            errMsg.innerText = "Network Error!";
            speak("কানেকশনে সমস্যা হচ্ছে।");
        }
    }

    function speak(text) {
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'bn-BD';
        synth.speak(utter);
        log.innerText = "এলা: " + text;
    }

    recognition.onend = () => recognition.start();
</script>
</body>
</html>
