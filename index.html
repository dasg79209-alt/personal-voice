<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ella AI - Smart Response</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .orb { width: 140px; height: 140px; background: #00f2fe; border-radius: 50%; box-shadow: 0 0 40px #00f2fe; cursor: pointer; transition: 0.3s; }
        .orb.listening { animation: pulse 1s infinite alternate; background: #fff; }
        #log { margin-top: 25px; font-size: 18px; color: #00f2fe; text-align: center; padding: 0 20px; min-height: 40px; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="orb" id="orb"></div>
        <h1 style="letter-spacing: 5px; color: #00f2fe; margin-top: 20px;">ELLA</h1>
        <div id="log">একবার ক্লিক করে কথা বলুন...</div>
    </div>

<script>
    const orb = document.getElementById('orb');
    const log = document.getElementById('log');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    
    recognition.lang = 'bn-BD';
    recognition.continuous = false; // এটি গুরুত্বপূর্ণ: কথা শেষ হলে নিজে থেকেই থামবে
    recognition.interimResults = false;

    orb.onclick = () => {
        recognition.start();
        orb.classList.add('listening');
        log.innerText = "আমি শুনছি...";
    };

    recognition.onresult = (event) => {
        orb.classList.remove('listening');
        const transcript = event.results[0][0].transcript.toLowerCase();
        log.innerText = "আপনি বলেছেন: " + transcript;

        // কমান্ড চেক করা
        if (transcript.includes("ইউটিউব") || transcript.includes("youtube")) {
            speak("অবশ্যই, ইউটিউব খুলছি।");
            setTimeout(() => { window.location.href = "https://www.youtube.com"; }, 1500);
        } 
        else if (transcript.includes("ফেসবুক") || transcript.includes("facebook")) {
            speak("ফেসবুক ওপেন করছি।");
            setTimeout(() => { window.location.href = "https://www.facebook.com"; }, 1500);
        }
        else if (transcript.includes("আবহাওয়া")) {
            speak("ঝাড়গ্রামের আবহাওয়া দেখুন।");
            setTimeout(() => { window.location.href = "https://dasg79209-alt.github.io/jhargram.weather/weather.html"; }, 1500);
        }
        else {
            // অন্য সাধারণ প্রশ্নের জন্য জেমিনি ছাড়াই ছোট উত্তর
            speak("আমি শুধু ইউটিউব, ফেসবুক বা আবহাওয়া খুলতে পারি।");
        }
    };

    recognition.onend = () => {
        orb.classList.remove('listening');
        // কথা শেষ হওয়ার পর সে আবার রেডি হয়ে যাবে ৩ সেকেন্ড পর
        setTimeout(() => { log.innerText = "আবার ডাকুন..."; }, 3000);
    };

    function speak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'bn-BD';
        window.speechSynthesis.speak(utter);
    }
</script>
</body>
</html>
